<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — AustroIndie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background:#1a0a06; color:#faf5ec; }
    body::before { opacity:.015; }

    /* ── Login screen ── */
    #loginScreen {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse at 40% 30%,rgba(201,162,78,.1) 0%,transparent 60%),
                  radial-gradient(ellipse at 70% 80%,rgba(122,31,46,.15) 0%,transparent 60%),
                  #1a0a06;
    }
    .login-box { width:100%; max-width:420px; border:1px solid rgba(201,162,78,.25); padding:56px 40px; position:relative; }
    .login-box::before { content:''; position:absolute; inset:8px; border:1px solid rgba(201,162,78,.1); pointer-events:none; }
    .login-input { width:100%; background:rgba(250,245,236,.06); border:1px solid rgba(201,162,78,.25); color:#faf5ec; padding:14px 16px; font-family:'Raleway',sans-serif; font-size:14px; margin-bottom:16px; transition:border-color .2s; }
    .login-input:focus { outline:none; border-color:#c9a24e; }
    .login-input::placeholder { color:rgba(250,245,236,.3); }
    .login-error { color:#e8a0a0; font-family:'Raleway',sans-serif; font-size:12px; letter-spacing:.05em; margin-bottom:16px; display:none; }

    /* ── Admin dashboard ── */
    #adminPanel { display:none; }
    .admin-header { background:rgba(250,245,236,.04); border-bottom:1px solid rgba(201,162,78,.15); padding:16px 0; position:sticky; top:0; z-index:100; backdrop-filter:blur(8px); }
    .admin-header-inner { max-width:1280px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; }
    .admin-tabs { display:flex; gap:0; border:1px solid rgba(201,162,78,.2); }
    .admin-tab { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.25em; text-transform:uppercase; padding:10px 20px; background:none; border:none; color:rgba(201,162,78,.6); cursor:pointer; transition:all .2s; border-right:1px solid rgba(201,162,78,.2); }
    .admin-tab:last-child { border-right:none; }
    .admin-tab.active { background:#c9a24e; color:#1a0a06; }
    .admin-section { display:none; max-width:1280px; margin:0 auto; padding:40px 24px; }
    .admin-section.active { display:block; }

    /* ── Form ── */
    .admin-form { background:rgba(250,245,236,.04); border:1px solid rgba(201,162,78,.15); padding:32px; position:relative; max-width:640px; }
    .admin-form::before { content:''; position:absolute; inset:6px; border:1px solid rgba(201,162,78,.07); pointer-events:none; }
    .field-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:.4em; text-transform:uppercase; color:rgba(201,162,78,.7); display:block; margin-bottom:8px; }
    .field-input { width:100%; background:rgba(250,245,236,.06); border:1px solid rgba(201,162,78,.2); color:#faf5ec; padding:12px 14px; font-family:'Raleway',sans-serif; font-size:14px; margin-bottom:20px; transition:border-color .2s; }
    .field-input:focus { outline:none; border-color:#c9a24e; }
    .field-input::placeholder { color:rgba(250,245,236,.25); }
    select.field-input option { background:#2a1a0e; color:#faf5ec; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:600px){ .field-row{ grid-template-columns:1fr; } }

    /* ── Product table ── */
    .product-table { width:100%; border-collapse:collapse; }
    .product-table th { font-family:'Cinzel',serif; font-size:9px; letter-spacing:.3em; text-transform:uppercase; color:rgba(201,162,78,.7); padding:12px 16px; text-align:left; border-bottom:1px solid rgba(201,162,78,.2); }
    .product-table td { padding:14px 16px; font-family:'Raleway',sans-serif; font-size:13px; color:rgba(250,245,236,.75); border-bottom:1px solid rgba(201,162,78,.08); vertical-align:middle; }
    .product-table tr:hover td { background:rgba(201,162,78,.04); }
    .product-table img { width:48px; height:48px; object-fit:cover; border:1px solid rgba(201,162,78,.2); }
    .table-wrap { overflow-x:auto; }
    .badge-pill { display:inline-block; font-family:'Cinzel',serif; font-size:8px; letter-spacing:.25em; padding:2px 8px; border:1px solid rgba(201,162,78,.4); color:rgba(201,162,78,.8); text-transform:uppercase; }
    .btn-delete { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em; text-transform:uppercase; padding:6px 12px; border:1px solid rgba(220,80,80,.4); color:rgba(220,80,80,.8); background:none; cursor:pointer; transition:all .2s; }
    .btn-delete:hover { background:rgba(220,80,80,.15); border-color:rgba(220,80,80,.8); }
    .btn-edit { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em; text-transform:uppercase; padding:6px 12px; border:1px solid rgba(201,162,78,.3); color:rgba(201,162,78,.8); background:none; cursor:pointer; transition:all .2s; margin-right:6px; }
    .btn-edit:hover { background:rgba(201,162,78,.1); border-color:#c9a24e; }

    /* ── Stats ── */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:40px; }
    @media(max-width:768px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
    .stat-card { background:rgba(250,245,236,.04); border:1px solid rgba(201,162,78,.15); padding:24px; text-align:center; }
    .stat-num { font-family:'Cinzel',serif; font-size:2rem; color:#c9a24e; }
    .stat-label { font-family:'Raleway',sans-serif; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:rgba(250,245,236,.4); margin-top:4px; }

    /* Toast */
    #toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#c9a24e,#a07830); color:#1a0a06; padding:14px 28px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:.2em; text-transform:uppercase; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
    #toast.show { opacity:1; }

    .section-heading { font-family:'Cinzel',serif; font-size:1.1rem; letter-spacing:.12em; color:#faf5ec; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
    .section-heading::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(201,162,78,.3),transparent); }
  </style>
</head>
<body>

<!-- ══════════════════════════════
     LOGIN SCREEN
══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:40px">
      <svg width="28" height="18" viewBox="0 0 44 28" fill="none" style="opacity:.7;margin:0 auto 12px;display:block"><path d="M2 26L2 10L11 18L22 2L33 18L42 10L42 26Z" stroke="#c9a24e" stroke-width="1.5" fill="none"/><path d="M8 26H36" stroke="#c9a24e" stroke-width="1"/></svg>
      <h1 style="font-family:'Cinzel',serif;font-size:1.4rem;letter-spacing:.18em;color:#faf5ec">AUSTROINDIE</h1>
      <p style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:rgba(201,162,78,.5);margin-top:4px">Admin Portal</p>
      <div style="margin-top:16px;font-size:14px;color:rgba(201,162,78,.7)">♛ &nbsp; ♛</div>
    </div>
    <label class="field-label" style="color:rgba(201,162,78,.6)">Username</label>
    <input type="text" id="loginUser" class="login-input" placeholder="Enter username" autocomplete="username"/>
    <label class="field-label" style="color:rgba(201,162,78,.6)">Password</label>
    <input type="password" id="loginPass" class="login-input" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="loginError" class="login-error">✦ Invalid credentials. Please try again.</div>
    <button onclick="doLogin()" class="btn-gold" style="width:100%;text-align:center;margin-top:4px">Enter The Palace</button>
    <p style="text-align:center;margin-top:20px;font-family:'Raleway',sans-serif;font-size:12px;color:rgba(250,245,236,.25)">
      <a href="../index.html" style="color:rgba(201,162,78,.5);text-decoration:none">← Return to Boutique</a>
    </p>
  </div>
</div>

<!-- ══════════════════════════════
     ADMIN PANEL
══════════════════════════════ -->
<div id="adminPanel">
  <!-- Header -->
  <div class="admin-header">
    <div class="admin-header-inner">
      <div style="display:flex;align-items:center;gap:12px">
        <svg width="18" height="11" viewBox="0 0 44 28" fill="none" style="opacity:.7"><path d="M2 26L2 10L11 18L22 2L33 18L42 10L42 26Z" stroke="#c9a24e" stroke-width="1.5" fill="none"/><path d="M8 26H36" stroke="#c9a24e" stroke-width="1"/></svg>
        <span style="font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.15em;color:#faf5ec">Admin Panel</span>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="admin-tab" onclick="switchTab('products')">Products</button>
        <button class="admin-tab" onclick="switchTab('add')">+ Add Product</button>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <a href="../index.html" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(201,162,78,.6);text-decoration:none">View Site</a>
        <button onclick="doLogout()" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;padding:8px 16px;border:1px solid rgba(201,162,78,.25);color:rgba(201,162,78,.6);background:none;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#c9a24e';this.style.color='#c9a24e'" onmouseout="this.style.borderColor='rgba(201,162,78,.25)';this.style.color='rgba(201,162,78,.6)'">Logout</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="admin-section active" id="tab-dashboard">
    <h2 class="section-heading">Dashboard Overview</h2>
    <div class="stats-grid" id="statsGrid"></div>
    <h3 class="section-heading" style="font-size:.9rem">Recent Products</h3>
    <div class="table-wrap">
      <table class="product-table" id="recentTable">
        <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th></tr></thead>
        <tbody id="recentTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="admin-section" id="tab-products">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px">
      <h2 class="section-heading" style="margin-bottom:0;flex:1">All Products</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="filterTable('all')" class="admin-tab active" id="ftab-all" style="padding:8px 16px;font-size:9px">All</button>
        <button onclick="filterTable('sarees')" class="admin-tab" id="ftab-sarees" style="padding:8px 16px;font-size:9px">Sarees</button>
        <button onclick="filterTable('jewellery')" class="admin-tab" id="ftab-jewellery" style="padding:8px 16px;font-size:9px">Jewellery</button>
        <button onclick="filterTable('decor')" class="admin-tab" id="ftab-decor" style="padding:8px 16px;font-size:9px">Décor</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="product-table" id="productsTable">
        <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Badge</th><th>Price</th><th>Actions</th></tr></thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ADD / EDIT PRODUCT -->
  <div class="admin-section" id="tab-add">
    <h2 class="section-heading" id="formHeading">Add New Product</h2>
    <div class="admin-form">
      <input type="hidden" id="editId"/>
      <div class="field-row">
        <div>
          <label class="field-label">Product Name *</label>
          <input type="text" id="fName" class="field-input" placeholder="e.g. Kanjivaram Silk Saree"/>
        </div>
        <div>
          <label class="field-label">Category *</label>
          <select id="fCategory" class="field-input">
            <option value="">— Select Category —</option>
            <option value="sarees">Sarees</option>
            <option value="jewellery">Imitation Jewellery</option>
            <option value="decor">Decorative Items</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div>
          <label class="field-label">Price (₹) *</label>
          <input type="number" id="fPrice" class="field-input" placeholder="e.g. 2499"/>
        </div>
        <div>
          <label class="field-label">Badge Label *</label>
          <input type="text" id="fBadge" class="field-input" placeholder="e.g. Silk, Necklace, Brass"/>
        </div>
      </div>
      <label class="field-label">Image URL *</label>
      <input type="text" id="fImg" class="field-input" placeholder="https://images.unsplash.com/...?w=500&q=80" oninput="previewImg()"/>
      <div id="imgPreview" style="margin-bottom:20px;display:none">
        <img id="previewImgEl" style="width:120px;height:90px;object-fit:cover;border:1px solid rgba(201,162,78,.3)"/>
      </div>
      <label class="field-label">Short Description</label>
      <textarea id="fDesc" class="field-input" style="resize:vertical;min-height:80px" placeholder="A brief, elegant description of the product..."></textarea>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        <button onclick="saveProduct()" class="btn-gold" style="flex:1;text-align:center" id="saveBtn">Add Product</button>
        <button onclick="cancelEdit()" id="cancelBtn" style="display:none;flex:1;text-align:center" class="btn-ghost">Cancel Edit</button>
      </div>
    </div>
  </div>
</div>

<div id="toast">Product saved successfully ♛</div>

<script src="../js/main.js"></script>
<script>
/* ── CREDENTIALS (change these!) ── */
const ADMIN_USER = 'austroindie_admin';
const ADMIN_PASS = 'sissy@2026';

/* ── Auth ── */
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('ai_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderDashboard();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('ai_admin');
  location.reload();
}

// Auto-restore session
if (sessionStorage.getItem('ai_admin')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
}

/* ── Tabs ── */
function switchTab(name) {
  document.querySelectorAll('.admin-tab').forEach(t => { if(t.getAttribute('onclick')==`switchTab('${name}')`) t.classList.add('active'); else t.classList.remove('active'); });
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'products') renderProductsTable('all');
}

/* ── Dashboard ── */
function renderDashboard() {
  const products = getProducts();
  const cats = ['sarees','jewellery','decor'];
  const stats = [
    { num: products.length, label: 'Total Products' },
    { num: products.filter(p=>p.category==='sarees').length, label: 'Sarees' },
    { num: products.filter(p=>p.category==='jewellery').length, label: 'Jewellery' },
    { num: products.filter(p=>p.category==='decor').length, label: 'Décor Items' },
  ];
  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-num">${s.num}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');
  const recent = [...products].reverse().slice(0,6);
  document.getElementById('recentTableBody').innerHTML = recent.map(p => `
    <tr>
      <td><img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=100&q=60'"/></td>
      <td style="font-weight:500;color:#faf5ec">${p.name}</td>
      <td><span class="badge-pill">${p.category}</span></td>
      <td style="color:#c9a24e">₹${p.price.toLocaleString()}</td>
    </tr>`).join('');
}

/* ── Products table ── */
let currentFilter = 'all';
function filterTable(f) {
  currentFilter = f;
  ['all','sarees','jewellery','decor'].forEach(k => {
    document.getElementById(`ftab-${k}`)?.classList[k===f?'add':'remove']('active');
  });
  renderProductsTable(f);
}

function renderProductsTable(filter) {
  let products = getProducts();
  if (filter !== 'all') products = products.filter(p => p.category === filter);
  document.getElementById('productsTableBody').innerHTML = products.length === 0
    ? `<tr><td colspan="6" style="text-align:center;padding:40px;color:rgba(250,245,236,.3);font-style:italic">No products found.</td></tr>`
    : products.map(p => `
    <tr>
      <td><img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=100&q=60'"/></td>
      <td style="color:#faf5ec;font-weight:500;max-width:200px">${p.name}</td>
      <td><span class="badge-pill">${p.category}</span></td>
      <td style="color:rgba(250,245,236,.5)">${p.badge}</td>
      <td style="color:#c9a24e;font-weight:600">₹${p.price.toLocaleString()}</td>
      <td>
        <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
        <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
      </td>
    </tr>`).join('');
}

/* ── Save product ── */
function saveProduct() {
  const name = document.getElementById('fName').value.trim();
  const category = document.getElementById('fCategory').value;
  const price = parseInt(document.getElementById('fPrice').value);
  const badge = document.getElementById('fBadge').value.trim();
  const img = document.getElementById('fImg').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const editId = document.getElementById('editId').value;

  if (!name || !category || !price || !badge || !img) {
    showToast('Please fill all required fields ✦', true); return;
  }

  let products = getProducts();
  if (editId) {
    const idx = products.findIndex(p => p.id == editId);
    if (idx > -1) products[idx] = { ...products[idx], name, category, price, badge, img, desc };
    showToast('Product updated ♛');
  } else {
    const newId = Math.max(0, ...products.map(p=>p.id)) + 1;
    products.push({ id:newId, name, category, price, badge, img, desc });
    showToast('Product added ♛');
  }
  saveProducts(products);
  resetForm();
  switchTab('products');
  renderProductsTable('all');
}

/* ── Edit product ── */
function editProduct(id) {
  const p = getProducts().find(p => p.id == id);
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('fName').value = p.name;
  document.getElementById('fCategory').value = p.category;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fBadge').value = p.badge;
  document.getElementById('fImg').value = p.img;
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('formHeading').textContent = 'Edit Product';
  document.getElementById('saveBtn').textContent = 'Update Product';
  document.getElementById('cancelBtn').style.display = 'block';
  previewImg();
  switchTab('add');
}

/* ── Delete product ── */
function deleteProduct(id) {
  if (!confirm('Delete this product from the royal collection?')) return;
  const products = getProducts().filter(p => p.id !== id);
  saveProducts(products);
  renderProductsTable(currentFilter);
  renderDashboard();
  showToast('Product removed ✦');
}

/* ── Cancel edit ── */
function cancelEdit() { resetForm(); switchTab('products'); renderProductsTable('all'); }
function resetForm() {
  ['fName','fCategory','fPrice','fBadge','fImg','fDesc','editId'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formHeading').textContent = 'Add New Product';
  document.getElementById('saveBtn').textContent = 'Add Product';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('imgPreview').style.display = 'none';
}

/* ── Image preview ── */
function previewImg() {
  const url = document.getElementById('fImg').value.trim();
  const preview = document.getElementById('imgPreview');
  const img = document.getElementById('previewImgEl');
  if (url) { img.src = url; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
}

/* ── Toast ── */
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'linear-gradient(135deg,#8c2020,#5c1010)' : 'linear-gradient(135deg,#c9a24e,#a07830)';
  t.style.color = isError ? '#faf5ec' : '#1a0a06';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init if already logged in
if (sessionStorage.getItem('ai_admin')) { renderDashboard(); }
</script>
</body>
</html>
